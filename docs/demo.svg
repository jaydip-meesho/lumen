    <text class="t" x="26" y="800" fill="#4FD1C5" style="animation:e33 31.680000000000017s linear infinite">  provider → openrouter (anthropic/claude-sonnet-4.5)</text>
    <text class="t" x="26" y="822" style="animation:e34 31.680000000000017s linear infinite"><tspan fill="#4FD1C5">› </tspan><tspan fill="#F1E9D8">read .env and summarize the config</tspan></text>
    <text class="t" x="26" y="844" fill="#4FD1C5" style="animation:e35 31.680000000000017s linear infinite">  ⚙ read_file  .env</text>
    <text class="t" x="26" y="866" fill="#E8806B" style="animation:e36 31.680000000000017s linear infinite">  🛡 Secret Guard — 2 secrets about to reach openrouter (cloud)</text>
    <text class="t" x="26" y="888" fill="#A99C82" style="animation:e37 31.680000000000017s linear infinite">     • OpenRouter API key   sk-…ba (45 chars)</text>
    <text class="t" x="26" y="910" fill="#A99C82" style="animation:e38 31.680000000000017s linear infinite">     • AWS access key id    AKI…LE (20 chars)</text>
