    <text class="t" x="26" y="954" fill="#93D07E" style="animation:e40 31.680000000000017s linear infinite">  ✓ sent with secrets redacted — the keys never left your machine</text>
    <text class="t" x="26" y="976" style="animation:e41 31.680000000000017s linear infinite"><tspan fill="#4FD1C5">› </tspan><tspan fill="#F1E9D8">/airgap</tspan></text>
    <text class="t" x="26" y="998" fill="#93D07E" style="animation:e42 31.680000000000017s linear infinite">  🔒 Airgap ENGAGED — all outbound network is now blocked</text>
    <text class="t" x="26" y="1020" style="animation:e43 31.680000000000017s linear infinite"><tspan fill="#4FD1C5">› </tspan><tspan fill="#F1E9D8">summarize the repo</tspan></text>
    <text class="t" x="26" y="1042" fill="#E8806B" style="animation:e44 31.680000000000017s linear infinite">  ✗ Airgap is ON — refusing cloud provider 'openrouter'. Nothing left.</text>
