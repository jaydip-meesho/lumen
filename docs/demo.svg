<rect width="940" height="600" rx="14" fill="#0C0A07"/>
<rect width="940" height="46" rx="14" fill="#1E1A13"/>
<rect y="30" width="940" height="16" fill="#1E1A13"/>
<line x1="0" y1="46" x2="940" y2="46" stroke="#332B20"/>
<circle cx="28" cy="26" r="6" fill="#E8806B"/><circle cx="50" cy="26" r="6" fill="#F4B740"/><circle cx="72" cy="26" r="6" fill="#4FD1C5"/>
<text x="108" y="31" font-size="12.5" fill="#A99C82">lumen — demo</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e0 33.4s linear infinite">LUMEN · privacy-first coding harness</text>
<text x="30" y="118" class="ln" fill="#A99C82" style="animation:e1 33.4s linear infinite">$ pipx install lumen-code</text>
<text x="30" y="142" class="ln" fill="#F1E9D8" style="animation:e2 33.4s linear infinite">$ lumen</text>
<text x="30" y="166" class="ln" fill="#4FD1C5" style="animation:e3 33.4s linear infinite">  provider   local · qwen3-coder:30b</text>
<text x="30" y="190" class="ln" fill="#4FD1C5" style="animation:e4 33.4s linear infinite">  mode       offline · code never leaves this machine</text>
<text x="30" y="214" class="ln" fill="#A99C82" style="animation:e5 33.4s linear infinite">  guard      secret guard ON      airgap  off</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e6 33.4s linear infinite">1 · OFFLINE BUILD  —  no internet, no limits</text>
<text x="30" y="118" class="ln" fill="#F1E9D8" style="animation:e7 33.4s linear infinite">› build hello.py that prints "hi from lumen", then run it</text>
<text x="30" y="142" class="ln" fill="#4FD1C5" style="animation:e8 33.4s linear infinite">  ⚙ write_file  hello.py                        new file</text>
<text x="30" y="166" class="ln" fill="#8FCf7f" style="animation:e9 33.4s linear infinite">     + print("hi from lumen")</text>
<text x="30" y="190" class="ln" fill="#4FD1C5" style="animation:e10 33.4s linear infinite">  ⚙ run_bash    python3 hello.py                exit 0</text>
<text x="30" y="214" class="ln" fill="#A99C82" style="animation:e11 33.4s linear infinite">     hi from lumen</text>
<text x="30" y="238" class="ln" fill="#FFD980" style="animation:e12 33.4s linear infinite">  lumen  ✓ created hello.py and verified the output</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e13 33.4s linear infinite">2 · SEE EVERY CHANGE  —  diff preview + undo</text>
<text x="30" y="118" class="ln" fill="#F1E9D8" style="animation:e14 33.4s linear infinite">› add a farewell line and run it again</text>
<text x="30" y="142" class="ln" fill="#4FD1C5" style="animation:e15 33.4s linear infinite">  ⚙ edit_file  hello.py         change preview:</text>
<text x="30" y="166" class="ln" fill="#7FD3E0" style="animation:e16 33.4s linear infinite">    @@ hello.py @@</text>
<text x="30" y="190" class="ln" fill="#8FCf7f" style="animation:e17 33.4s linear infinite">    + print("bye from lumen")</text>
<text x="30" y="214" class="ln" fill="#F4B740" style="animation:e18 33.4s linear infinite">  allow?  (y)es / (n)o / (a)lways  ▸ y</text>
<text x="30" y="238" class="ln" fill="#A99C82" style="animation:e19 33.4s linear infinite">     hi from lumen</text>
<text x="30" y="262" class="ln" fill="#A99C82" style="animation:e20 33.4s linear infinite">     bye from lumen</text>
<text x="30" y="286" class="ln" fill="#F1E9D8" style="animation:e21 33.4s linear infinite">› /undo</text>
<text x="30" y="310" class="ln" fill="#F4B740" style="animation:e22 33.4s linear infinite">  ↩ reverted hello.py to its previous contents</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e23 33.4s linear infinite">3 · PROVABLE PRIVACY  —  airgap mode</text>
<text x="30" y="118" class="ln" fill="#F1E9D8" style="animation:e24 33.4s linear infinite">› /airgap</text>
<text x="30" y="142" class="ln" fill="#8FCf7f" style="animation:e25 33.4s linear infinite">  🔒 Airgap ENGAGED — all network egress blocked</text>
<text x="30" y="166" class="ln" fill="#F1E9D8" style="animation:e26 33.4s linear infinite">$ lumen -p openrouter "summarize this repo"</text>
<text x="30" y="190" class="ln" fill="#E8806B" style="animation:e27 33.4s linear infinite">  ✗ Airgap is ON — refusing cloud provider 'openrouter'.</text>
<text x="30" y="214" class="ln" fill="#E8806B" style="animation:e28 33.4s linear infinite">    Nothing left the machine.</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e29 33.4s linear infinite">4 · SECRET GUARD  —  keys never leak to the cloud</text>
<text x="30" y="118" class="ln" fill="#F1E9D8" style="animation:e30 33.4s linear infinite">$ lumen -p openrouter</text>
<text x="30" y="142" class="ln" fill="#F1E9D8" style="animation:e31 33.4s linear infinite">› read .env and tell me what's configured</text>
<text x="30" y="166" class="ln" fill="#4FD1C5" style="animation:e32 33.4s linear infinite">  ⚙ read_file  .env</text>
<text x="30" y="190" class="ln" fill="#E8806B" style="animation:e33 33.4s linear infinite">  🛡 Secret Guard — 2 secrets about to reach openrouter</text>
<text x="30" y="214" class="ln" fill="#A99C82" style="animation:e34 33.4s linear infinite">     • OpenRouter API key   sk-…ba (45 chars)</text>
<text x="30" y="238" class="ln" fill="#A99C82" style="animation:e35 33.4s linear infinite">     • AWS access key id    AKI…LE (20 chars)</text>
<text x="30" y="262" class="ln" fill="#F4B740" style="animation:e36 33.4s linear infinite">  redact / send / cancel  ▸ cancel</text>
<text x="30" y="286" class="ln" fill="#E8806B" style="animation:e37 33.4s linear infinite">  ✗ Cancelled — nothing was sent.</text>
<text x="30" y="86" class="lbl" fill="#F4B740" style="animation:e38 33.4s linear infinite">5 · YOUR KEY, THE WHOLE CATALOGUE  +  local sessions</text>
<text x="30" y="118" class="ln" fill="#F1E9D8" style="animation:e39 33.4s linear infinite">› /models claude</text>
<text x="30" y="142" class="ln" fill="#F1E9D8" style="animation:e40 33.4s linear infinite">  anthropic/claude-sonnet-4.5      200k ctx     $3/M in</text>
<text x="30" y="166" class="ln" fill="#A99C82" style="animation:e41 33.4s linear infinite">  anthropic/claude-opus-4.8        200k ctx     …</text>
<text x="30" y="190" class="ln" fill="#4FD1C5" style="animation:e42 33.4s linear infinite">› /model anthropic/claude-sonnet-4.5        model set</text>
<text x="30" y="214" class="ln" fill="#4FD1C5" style="animation:e43 33.4s linear infinite">$ lumen --continue      ↺ resumed local session (8 msgs)</text>
<text x="470.0" y="248" class="big" fill="#FFD980" text-anchor="middle" style="animation:e44 33.4s linear infinite">LUMEN</text>
<text x="470.0" y="334" class="ctr" fill="#F1E9D8" text-anchor="middle" style="animation:e45 33.4s linear infinite">your machine  ·  your models  ·  your rules</text>
<text x="470.0" y="368" class="ctr" fill="#F4B740" text-anchor="middle" style="animation:e46 33.4s linear infinite">pipx install lumen-code</text>
<text x="470.0" y="402" class="ctr" fill="#A99C82" text-anchor="middle" style="animation:e47 33.4s linear infinite">github.com/jaydip-meesho/lumen</text>
<rect x="0" y="595" width="940" height="5" fill="#332B20"/>
<rect x="0" y="595" width="940" height="5" fill="#F4B740" style="transform-box:fill-box;transform-origin:left;animation:prog 33.4s linear infinite"/>
