    <text class="t" x="26" y="712" style="animation:e29 31.680000000000017s linear infinite"><tspan fill="#4FD1C5">› </tspan><tspan fill="#F1E9D8">/models claude</tspan></text>
    <text class="t" x="26" y="734" fill="#A99C82" style="animation:e30 31.680000000000017s linear infinite">  anthropic/claude-sonnet-4.5      200k ctx     $3/M in</text>
