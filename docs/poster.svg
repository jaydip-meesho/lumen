<text x="898" y="124" font-family="ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace" font-size="10" fill="#7C7159" font-weight="700" text-anchor="middle" letter-spacing="1.5">BUILDATHON ’26</text>
<rect x="58" y="76" width="52" height="52" rx="14" fill="#241F16" stroke="#F4B740" stroke-width="1.5"/>
<line x1="99.0" y1="102.0" x2="105.0" y2="102.0" stroke="#F4B740" stroke-width="2" stroke-linecap="round"/>
